name: Daily Contrarian Stock Monitor

on:
  schedule:
    - cron: "0 22 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        run: python contrarian.py

      - name: Commit report if created
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/*.csv || true
          git diff --cached --quiet || git commit -m "Add daily contrarian report"
          git push
