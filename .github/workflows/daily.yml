name: Daily Contrarian Stock Monitor

on:
  schedule:
    - cron: "0 22 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          EMAIL_TO: balkissoc@gmail.com
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SEND_EMAIL: "true"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          AUTO_ASX300: "true"
          MAX_OPENAI_CLASSIFICATIONS: "12"
        run: python contrarian.py

      - name: Add report to workflow summary
        if: always()
        run: |
          if [ -f reports/latest_summary.md ]; then
            cat reports/latest_summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No latest_summary.md file was created." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit report and dashboard if created
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html reports/*.csv reports/*.md || true
          git diff --cached --quiet || git commit -m "Add daily contrarian report"
          git push
